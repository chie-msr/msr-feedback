<script>
'use strict';

// 1. Updated Categories
const ASPECTS = [
  'Recruitment Process',
  'Documentation Process',
  'Communication & Updates',
  'Professionalism',
  'Processing Speed',
  'Overall Satisfaction'
];

// ... [Keep your existing buildRatings function exactly as it was] ...

/* ── Updated Submit Logic with Google Sheets Integration ── */
async function handleSubmit() {
  const nameEl = document.getElementById('f-name');
  if (!nameEl.value.trim()) {
    nameEl.classList.add('error');
    nameEl.focus();
    showToast('Please enter your full name', '⚠️');
    return;
  }

  // UI Loading State
  const btn = document.querySelector('.submit-btn');
  const originalText = btn.textContent;
  btn.textContent = 'Submitting...';
  btn.disabled = true;

  const data = getFormData();
  
  // Format ratings for the database
  data.ratings = ASPECTS.map((a, i) => `${a}: ${ratings[i]}/5`).join(' | ');
  data.timestamp = new Date().toLocaleString(); // Local date/time log

  // PASTE YOUR DEPLOYED WEB APP URL HERE:
  const WEB_APP_URL = 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE'; 

  try {
    await fetch(WEB_APP_URL, {
      method: 'POST',
      mode: 'no-cors', // Essential for Google Apps Script
      cache: 'no-cache',
      body: JSON.stringify(data)
    });

    // Success Screen
    document.getElementById('ff-form').style.display = 'none';
    document.getElementById('successScreen').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
    
  } catch (error) {
    console.error("Submission failed:", error);
    showToast('Error sending feedback. Please try again.', '❌');
    btn.textContent = originalText;
    btn.disabled = false;
  }
}

// ... [Keep your existing clearForm, resetForm, export functions, etc.] ...
</script>
