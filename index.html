<script>
'use strict';

// 1. UPDATED LABELS (Service Ratings Preserved)
const ASPECTS = [
  'Recruitment Process',
  'Documentation Process',
  'Communication & Updates',
  'Professionalism',
  'Processing Speed',
  'Overall Satisfaction'
];

const ratings = {}; 

// ... [Keep your existing buildRatings function logic here] ...

/* ── FINALIZED SUBMISSION LOGIC ── */
async function handleSubmit() {
  const nameEl = document.getElementById('f-name');
  if (!nameEl.value.trim()) {
    nameEl.classList.add('error');
    nameEl.focus();
    showToast('Please enter your full name', '⚠️');
    return;
  }

  // Visual feedback
  const btn = document.querySelector('.submit-btn');
  btn.textContent = 'Submitting...';
  btn.disabled = true;

  const data = getFormData();
  // Format ratings for the sheet
  data.ratings = ASPECTS.map((a, i) => `${a}: ${ratings[i]}/5`).join(' | ');
  data.timestamp = new Date().toLocaleString('en-PH');

  // PASTE YOUR GOOGLE WEB APP URL HERE:
  const WEB_APP_URL = 'PASTE_YOUR_DEPLOYED_URL_HERE';

  try {
    await fetch(WEB_APP_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify(data)
    });

    // Show Success
    document.getElementById('ff-form').style.display = 'none';
    document.getElementById('successScreen').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
    
  } catch (error) {
    console.error("Submission failed:", error);
    showToast('Error sending feedback. Please check connection.', '❌');
    btn.textContent = 'Submit Feedback';
    btn.disabled = false;
  }
}

</script>
